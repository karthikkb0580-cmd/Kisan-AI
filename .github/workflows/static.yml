name: Deploy Krishi AI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './Krishi/package-lock.json'

      - name: Install dependencies
        run: |
          cd Krishi
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd Krishi
          npm run build
        env:
          GITHUB_PAGES: 'true'
          # Set these in: GitHub repo → Settings → Secrets → Actions
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_TOMTOM_KEY: ${{ secrets.VITE_TOMTOM_KEY }}

      - name: Add SPA 404 fallback
        run: |
          cp Krishi/dist/index.html Krishi/dist/404.html

      - name: Fix hardcoded absolute paths in HTML
        run: |
          sed -i 's|href="/favicon3.png"|href="/Kisan-AI/favicon3.png"|g' Krishi/dist/index.html
          sed -i 's|href="/favicon3.png"|href="/Kisan-AI/favicon3.png"|g' Krishi/dist/404.html
          sed -i 's|content="/app_crops.png"|content="/Kisan-AI/app_crops.png"|g' Krishi/dist/index.html
          sed -i 's|content="/app_crops.png"|content="/Kisan-AI/app_crops.png"|g' Krishi/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Krishi/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
