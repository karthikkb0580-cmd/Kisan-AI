name: Deploy Krishi AI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Krishi/package-lock.json'

      - name: Install dependencies
        run: |
          cd Krishi
          npm ci

      - name: Build
        run: |
          cd Krishi
          npm run build
        env:
          GITHUB_PAGES: 'true'
          # ── Render backend URL ──────────────────────────────────────────────
          # Set this in: GitHub repo → Settings → Secrets → Actions
          # Value: https://krishi-ai-backend.onrender.com/api/v1
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # ── Supabase credentials ────────────────────────────────────────────
          # Set these in: GitHub repo → Settings → Secrets → Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # ── Maps (optional) ─────────────────────────────────────────────────
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_TOMTOM_KEY: ${{ secrets.VITE_TOMTOM_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Krishi/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
