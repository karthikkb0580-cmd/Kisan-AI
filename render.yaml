services:
  - type: web
    name: krishi-ai-backend
    runtime: python
    region: singapore        # Closest to India — Render has no India datacenter
    rootDir: Krishi/server_python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health

    envVars:
      # ── Core ──────────────────────────────────────────────────────────────────
      - key: PORT
        value: "8000"

      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value

      - key: JWT_ALGORITHM
        value: HS256

      # ── Gemini AI ─────────────────────────────────────────────────────────────
      # Get from: https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false

      # ── Supabase PostgreSQL ────────────────────────────────────────────────────
      # Supabase → Project Settings → Database → Connection string → URI tab
      - key: DATABASE_URL
        sync: false

      # ── Supabase Auth JWT ──────────────────────────────────────────────────────
      # Supabase → Project Settings → API → JWT Settings → Reveal
      - key: SUPABASE_JWT_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────────
      # Your GitHub Pages URL e.g. https://yourusername.github.io
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Keep-Alive (internal self-ping loop) ──────────────────────────────────
      # Render sets this automatically; also add it here so the backend
      # self-ping loop starts working immediately after first deploy.
      - key: RENDER_EXTERNAL_URL
        sync: false

      # ── Optional ──────────────────────────────────────────────────────────────
      - key: HUGGINGFACE_API_KEY
        sync: false
