services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key (get free key at aistudio.google.com)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT token signing (auto-generated)"

      - key: DATABASE_URL
        sync: false
        description: "Optional: PostgreSQL URL (e.g. from Supabase/Neon) for persistent storage. Leave blank to use SQLite."

      # ── Email / OTP Delivery via Gmail SMTP ────────────────────────────────
      - key: GMAIL_USER
        sync: false
        description: "Your Gmail address used to send OTP emails — e.g. yourname@gmail.com"

      - key: GMAIL_APP_PASSWORD
        sync: false
        description: "16-char Gmail App Password (NOT your regular password). Create at myaccount.google.com/apppasswords"

      # ── CORS ───────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false
        description: "Comma-separated list of allowed frontend origins, e.g. https://your-app.vercel.app"
