services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key for crop diagnosis"
      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT generation (automatically generated)"
      - key: RESEND_API_KEY
        sync: false
        description: "Optional: Resend API key for sending emails/OTPs"
      - key: DATABASE_URL
        sync: false
        description: "Optional: PostgreSQL connection URL (e.g. from Supabase/Neon) for persistent data storage"
