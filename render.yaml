services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key (get free key at aistudio.google.com)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT token signing (auto-generated)"

      - key: DATABASE_URL
        sync: false
        description: "Optional: PostgreSQL URL for persistent storage. Leave blank to use SQLite."

      # ── OTP Email Delivery — Set ONE of the following ──────────────────────
      #
      # OPTION A (Recommended for Render): Resend free HTTP API
      #   1. Sign up free at https://resend.com
      #   2. Go to API Keys → Create Key → copy the key (starts with re_)
      #   3. Paste it below. No domain verification needed for onboarding@resend.dev
      - key: RESEND_API_KEY
        sync: false
        description: "Resend API key for OTP emails (free, 3000/month). Get at resend.com. RECOMMENDED for Render."

      # OPTION B: Gmail SMTP (works locally; may be unreliable on Render free tier)
      #   Get App Password at: https://myaccount.google.com/apppasswords
      - key: GMAIL_USER
        sync: false
        description: "Gmail address for sending OTP emails (e.g. yourname@gmail.com)"

      - key: GMAIL_APP_PASSWORD
        sync: false
        description: "16-char Gmail App Password (NOT your Gmail login password)"

      # ── CORS ───────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false
        description: "Comma-separated frontend origins, e.g. https://your-app.vercel.app"
