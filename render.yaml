services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key for crop diagnosis (get free key at aistudio.google.com)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT token signing (auto-generated)"

      - key: DATABASE_URL
        sync: false
        description: "Optional: PostgreSQL URL (e.g. from Supabase/Neon) for persistent storage. Leave blank to use SQLite."

      # ── Email / OTP Delivery via Gmail SMTP ──────────────────────────────────
      - key: EMAIL_PROVIDER
        value: gmail
        description: "Email provider — set to gmail (uses GMAIL_USER + GMAIL_APP_PASSWORD below)"

      - key: GMAIL_USER
        sync: false
        description: "Your Gmail address — e.g. opkarthik2005@gmail.com"

      - key: GMAIL_APP_PASSWORD
        sync: false
        description: "16-char Gmail App Password (NOT your regular Gmail password). Create at myaccount.google.com/apppasswords"
