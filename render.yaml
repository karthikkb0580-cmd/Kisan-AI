services:
  - type: web
    name: krishi-ai-backend
    runtime: python
    region: singapore        # Closest to India — Render has no India datacenter
    rootDir: Krishi/server_python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health

    envVars:
      # ── Core ──────────────────────────────────────────────────────────────────
      - key: PORT
        value: "8000"

      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value

      - key: JWT_ALGORITHM
        value: HS256

      # ── Gemini AI ─────────────────────────────────────────────────────────────
      # Get from: https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false

      # ── Supabase PostgreSQL ────────────────────────────────────────────────────
      # Supabase → Project Settings → Database → Connection string → URI tab
      - key: DATABASE_URL
        sync: false

      # ── Supabase Auth JWT ──────────────────────────────────────────────────────
      # Supabase → Project Settings → API → JWT Settings → Reveal
      - key: SUPABASE_JWT_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────────
      # Your GitHub Pages URL e.g. https://yourusername.github.io
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Keep-Alive (internal self-ping loop) ──────────────────────────────────
      # Render sets this automatically; also add it here so the backend
      # self-ping loop starts working immediately after first deploy.
      - key: RENDER_EXTERNAL_URL
        sync: false

      # ── Email OTP — Gmail SMTP (RECOMMENDED — sends to ANY email address) ──────
      # ✅ Works on Render free tier (outbound port 587 is NOT blocked)
      # ✅ No domain verification needed — sends to all recipient emails
      # Steps:
      #   1. Enable 2-Step Verification: https://myaccount.google.com/security
      #   2. Create App Password: https://myaccount.google.com/apppasswords
      #   3. Set both values below in Render → Environment
      - key: GMAIL_USER
        sync: false          # e.g. yourgmail@gmail.com

      - key: GMAIL_APP_PASSWORD
        sync: false          # 16-char App Password (remove spaces)

      # ── Email OTP — Resend (FALLBACK — only if not using Gmail) ────────────────
      # ⚠️  WARNING: Resend's free shared domain (onboarding@resend.dev) ONLY
      #     delivers to emails verified in your Resend dashboard — not all users.
      #     You need a custom verified domain to send to arbitrary recipients.
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: RESEND_FROM
      #   value: "Krishi AI <onboarding@resend.dev>"

      # ── Optional ──────────────────────────────────────────────────────────────
      - key: HUGGINGFACE_API_KEY
        sync: false
