services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Free Gemini API key from aistudio.google.com"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT signing (auto-generated by Render)"

      - key: DATABASE_URL
        sync: false
        description: "Optional PostgreSQL URL. Leave blank to use SQLite."

      # ── Supabase (required for OTP email registration) ─────────────────────
      # 1. Go to https://supabase.com → New Project (free)
      # 2. Dashboard → Settings → API
      #    → Copy "JWT Secret" (click the Reveal button)
      - key: SUPABASE_JWT_SECRET
        sync: false
        description: "Supabase JWT Secret — Dashboard → Settings → API → JWT Secret. Required for OTP registration."

      # ── CORS ───────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false
        description: "Comma-separated frontend origins, e.g. https://your-app.vercel.app"
