services:
  - type: web
    name: krishi-ai-backend
    runtime: docker
    dockerfilePath: Krishi/server_python/Dockerfile
    dockerContext: Krishi/server_python
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key (get free key at aistudio.google.com)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for JWT token signing (auto-generated)"

      - key: DATABASE_URL
        sync: false
        description: "Optional: PostgreSQL URL (e.g. from Supabase/Neon) for persistent storage. Leave blank to use SQLite."

      # ── OTP Email Delivery via Resend (FREE — 3,000 emails/month) ───────────
      # Sign up at https://resend.com → API Keys → Create Key → paste here
      # Works on Render free tier — uses HTTPS, never blocked unlike SMTP
      - key: RESEND_API_KEY
        sync: false
        description: "Resend API key for OTP email delivery. Get free key at resend.com (3000 emails/month free)"

      # Optional: customize the From address.
      # On Resend free plan, use: Krishi AI <onboarding@resend.dev>
      # If you add your own domain in Resend, use: Krishi AI <noreply@yourdomain.com>
      - key: RESEND_FROM
        sync: false
        description: "From address for OTP emails. Default: Krishi AI <onboarding@resend.dev>"

      # ── CORS ───────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false
        description: "Comma-separated list of allowed frontend origins, e.g. https://your-app.vercel.app"
